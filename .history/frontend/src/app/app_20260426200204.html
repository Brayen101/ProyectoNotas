<main class="login-page">
	<section class="login-hero">
		<div class="brand-mark">
			<span class="brand-icon">💡</span>
		</div>
		<h1>Keep</h1>
		<p>Inicia sesion en tu cuenta</p>
	</section>

	<section class="login-card">
		<form class="login-form">
			<div class="field-group">
				<label for="email">Correo electronico</label>
				<div class="input-wrap">
					<span class="input-icon">✉</span>
					<input id="email" type="email" placeholder="tu@email.com" />
				</div>
			</div>

			<div class="field-group">
				<label for="password">Contraseña</label>
				<div class="input-wrap password-wrap">
					<span class="input-icon">🔒</span>
					<input id="password" type="password" placeholder="********" />
					<span class="eye-icon">◔</span>
				</div>
			</div>

			<a class="forgot-link" href="#">Olvidaste tu contraseña?</a>

			<button type="button" class="login-button">Iniciar sesion <span>→</span></button>

			<div class="divider">
				<span></span>
				<b>o</b>
				<span></span>
			</div>

			<p class="signup-text">
				No tienes una cuenta? <a href="#">Crear una cuenta</a>
			</p>
		</form>
	</section>

	<footer class="page-footer">Taller de Aplicaciones en Internet - 2026</footer>
</main>
