<div class="notas-container d-flex flex-column align-items-center mt-4">
  <div class="nota-creador shadow-sm p-3 w-100 mb-5" [class.expandido]="estaEditando">
    <div *ngIf="!estaEditando" class="nota-cerrada" (click)="expandir('nota')">
      <input
        type="text"
        placeholder="Crear una nota..."
        class="form-control bg-transparent border-0 text-white fw-bold nota-cerrada-input"
        readonly
      >
      <div class="iconos-cerrado text-secondary">
        <button type="button" class="icono-cerrado-btn" title="Crear lista" (click)="expandir('checklist'); $event.stopPropagation()">
          <i class="bi bi-check2-square"></i>
        </button>
        <button type="button" class="icono-cerrado-btn" title="Dibujo" (click)="expandir('dibujo'); $event.stopPropagation()">
          <i class="bi bi-brush"></i>
        </button>
        <button type="button" class="icono-cerrado-btn" title="Imagen" (click)="openImagePicker($event, imageInput)">
          <i class="bi bi-image"></i>
        </button>
      </div>
    </div>
    <input #imageInput type="file" accept="image/*" hidden (change)="onImageSelected($event)">

    <div *ngIf="estaEditando">
      <input type="text" placeholder="Título" [(ngModel)]="notaFormulario.titulo" class="form-control bg-transparent border-0 text-white fw-bold mb-2 shadow-none">
      <textarea placeholder="Añade una nota..." [(ngModel)]="notaFormulario.contenido" class="form-control bg-transparent border-0 text-white shadow-none" rows="3"></textarea>
      
      <div class="d-flex justify-content-between align-items-center mt-3">
        <div class="iconos-nota text-secondary">
          <i class="bi bi-bell me-3"></i>
          <i class="bi bi-person-plus me-3"></i>
          <i class="bi bi-palette me-3"></i>
          <button type="button" class="icono-cerrado-btn me-2" title="Imagen" (click)="openImagePicker($event, imageInput)">
            <i class="bi bi-image"></i>
          </button>
          <i class="bi bi-archive me-3"></i>
        </div>
        <button class="btn btn-link text-white text-decoration-none fw-bold" (click)="cerrar()">Cerrar</button>
      </div>
    </div>
  </div>

  <div class="row w-100 px-4">
      <p class="text-secondary text-center mensaje-vacio">Tus notas aparecerán aquí...</p>
  </div>
</div>
