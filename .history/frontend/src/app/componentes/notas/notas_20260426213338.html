<div class="notas-container d-flex flex-column align-items-center mt-4">
  <div class="nota-creador shadow-sm p-3 w-100 mb-5" [class.expandido]="estaEditando">
    <input #imagenInput type="file" accept="image/*" class="d-none" (change)="onImagenSeleccionada($event)">

    <div *ngIf="!estaEditando" class="nota-cerrada" (click)="expandir()">
      <input
        type="text"
        placeholder="Crear una nota..."
        class="form-control bg-transparent border-0 text-white fw-bold nota-cerrada-input"
        readonly
      >
      <div class="iconos-cerrado text-secondary">
        <button type="button" class="icon-btn" (click)="abrirEditor('lista', $event)">
          <i class="bi bi-check2-square"></i>
        </button>
        <button type="button" class="icon-btn" (click)="abrirEditor('dibujo', $event)">
          <i class="bi bi-brush"></i>
        </button>
        <button type="button" class="icon-btn" (click)="abrirSelectorImagen(imagenInput, $event)">
          <i class="bi bi-image"></i>
        </button>
      </div>
    </div>

    <div *ngIf="estaEditando">
      <input
        type="text"
        placeholder="Título"
        class="form-control bg-transparent border-0 text-white fw-bold mb-2 shadow-none"
        [(ngModel)]="notaFormulario.titulo"
      >
      <textarea
        [placeholder]="placeholderContenido"
        class="form-control bg-transparent border-0 text-white shadow-none"
        rows="3"
        [(ngModel)]="notaFormulario.contenido"
      ></textarea>

      <div *ngIf="imagenPreview" class="imagen-preview mt-3">
        <img [src]="imagenPreview" [alt]="imagenNombre || 'Imagen de nota'">
      </div>
      
      <div class="d-flex justify-content-between align-items-center mt-3">
        <div class="iconos-nota text-secondary">
          <i class="bi bi-bell me-3"></i>
          <i class="bi bi-person-plus me-3"></i>
          <i class="bi bi-palette me-3"></i>
          <button type="button" class="icon-btn me-3" (click)="abrirSelectorImagen(imagenInput, $event)">
            <i class="bi bi-image"></i>
          </button>
          <i class="bi bi-archive me-3"></i>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-link text-white text-decoration-none fw-bold" (click)="guardarNota()">Guardar</button>
          <button class="btn btn-link text-white text-decoration-none fw-bold" (click)="cerrar()">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="row w-100 px-4">
      <p class="text-secondary text-center mensaje-vacio">Tus notas aparecerán aquí...</p>
  </div>
</div>
