<header class="header d-flex align-items-center justify-content-between px-3">

    <button class="btn btn-dark-icon rounded-circle me-2">
      <i class="bi bi-list fs-4"></i>
    </button>
    <div class="logo d-flex align-items-center">
      <i class="bi bi-lightbulb-fill text-warning fs-3"></i>
      <span class="ms-2 fs-5 text-white fw-normal">Keep</span>
    </div>
  </div>

  <div class="search-box d-flex align-items-center flex-grow-1 mx-5 px-2">

    <input type="text" placeholder="Buscar" class="form-control bg-transparent border-0 text-white shadow-none">
  </div>

  <div class="actions d-flex align-items-center">
    <button class="btn btn-dark-icon"><i class="bi bi-arrow-clockwise"></i></button>
    <button class="btn btn-dark-icon"><i class="bi bi-view-stacked"></i></button>
