<div class="registro-container">
  <div class="registro-card">
    <!-- Logo y título -->
    <div class="registro-header">
      <div class="keep-icon">💡</div>
      <h1 class="registro-title">Crea una cuenta</h1>
      <p class="registro-subtitle">Únete a Keep y organiza tus ideas</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="registrar()" class="registro-form">
      <!-- Nombre Completo -->
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            class="form-input" 
            [(ngModel)]="usuario.name" 
            name="name" 
            placeholder="Tu nombre completo"
            required>
        </div>
      </div>

      <!-- Correo Electrónico -->
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input 
            type="email" 
            class="form-input" 
            [(ngModel)]="usuario.email" 
            name="email" 
            placeholder="tu@email.com"
            required>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            [type]="mostrarPassword ? 'text' : 'password'" 
            class="form-input" 
            [(ngModel)]="usuario.password" 
            name="password" 
            placeholder="Mínimo 6 caracteres"
            required>
          <button 
            type="button" 
            class="toggle-password"
            (click)="mostrarPassword = !mostrarPassword">
            {{ mostrarPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Confirmar Contraseña -->
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            [type]="mostrarConfirmPassword ? 'text' : 'password'" 
            class="form-input" 
            [(ngModel)]="usuario.confirmPassword" 
            name="confirmPassword" 
            placeholder="Repite tu contraseña"
            required>
          <button 
            type="button" 
            class="toggle-password"
            (click)="mostrarConfirmPassword = !mostrarConfirmPassword">
            {{ mostrarConfirmPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Fecha de Nacimiento (Opcional) -->
      <div class="form-group">
        <label class="form-label">
          Fecha de nacimiento <span class="optional-label">(opcional)</span>
        </label>
        <div class="input-wrapper">
          <span class="input-icon">📅</span>
          <input 
            type="date" 
            class="form-input" 
            [(ngModel)]="usuario.fecha_nacimiento" 
            name="fecha_nacimiento"
            placeholder="dd/mm/aaaa">
        </div>
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="mensajeError" class="error-message">
        {{ mensajeError }}
      </div>

      <!-- Botón Registrar -->
      <button type="submit" class="btn-registrar">
        Registrar <span class="arrow">→</span>
      </button>

      <!-- Link Login -->
      <div class="login-link">
        ¿Ya tienes una cuenta? <a routerLink="/login" class="link">Iniciar sesión</a>
      </div>
    </form>
  </div>
</div>
