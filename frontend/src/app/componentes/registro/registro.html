<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Registro de Usuario</h2>
        <form (ngSubmit)="registrar()">
          <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" [(ngModel)]="usuario.name" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" [(ngModel)]="usuario.email" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" [(ngModel)]="usuario.password" name="password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Fecha de Nacimiento</label>
            <input type="date" class="form-control" [(ngModel)]="usuario.fecha_nacimiento" name="fecha_nacimiento" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Registrar Usuario</button>
        </form>
      </div>
    </div>
  </div>
</div>
